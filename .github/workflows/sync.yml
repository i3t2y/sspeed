name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *" # every day
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      # Step 1: run a standard checkout action
      - name: Checkout target repo
        uses: actions/checkout@v6

      # Step 2: run the sync action
      - name: Sync upstream changes
        id: sync
        uses: aormsby/fork-sync-with-upstream-action@v3.4.3
        with:
          upstream_sync_repo: cmliu/edgetunnel
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }} # automatically generated, no need to set

          # Set test_mode true to run tests instead of the true action!!
          test_mode: false

      - name: Sync check
        if: failure()
        run: |
          echo "[Error] 由于上游仓库的 workflow 文件变更，导致 GitHub 自动暂停了本次自动更新，你需要手动 Sync Fork 一次，详细教程请查看项目README.md "
          echo "[Error] Due to a change in the workflow file of the upstream repository, GitHub has automatically suspended the scheduled automatic update. You need to manually sync your fork. Please refer to the project README.md for instructions. "
          exit 1
          
      # --- 8 个独立账号的矩阵部署逻辑 ---
      - name: 🚀 跨账号分发到 8 个独立节点
        if: success()
        run: |
          # 定义项目名称数组（假设你在每个账号下的项目名都叫 sd，或者叫 sd1, sd2...）
          # 注意：这里的顺序必须与 Secret 的编号 (1-8) 一一对应
          projects=("sd" "sd1" "sd2" "sd3" "sd4" "sd5" "sd6" "sd7")
          
          # 定义 Token 数组（从 GitHub Secrets 中动态读取）
          tokens=("$" "$" "$" "$" "$" "$" "$" "$")
          
          # 定义 Account ID 数组
          accounts=("$" "$" "$" "$" "$" "$" "$" "$")

          # 开始循环部署
          for i in "${!projects[@]}"; do
            echo "正在向账号 $((i+1)) 部署项目 ${projects[$i]}..."
            
            # 使用 Wrangler 进行部署
            # 我们通过环境变量直接传递当前循环对应的 Token 和 ID
            CLOUDFLARE_API_TOKEN=${tokens[$i]} \
            CLOUDFLARE_ACCOUNT_ID=${accounts[$i]} \
            npx wrangler pages deploy . --project-name=${projects[$i]} --branch=main
            
            echo "账号 $((i+1)) 部署完成。"
            sleep 3 # 稍微停顿，避免触发 API 频率限制
          done

          
